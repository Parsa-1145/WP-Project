<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f9fafb; }
        .success-box { background: white; border: 1px solid #4CAF50; padding: 30px; display: inline-block; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .ref-id { font-weight: bold; color: #333; font-size: 1.2em; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #007BFF; color: #fff; text-decoration: none; border-radius: 4px; transition: background 0.3s; }
        .btn:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="success-box">
        <h2 style="color: #4CAF50;">Payment Completed Successfully</h2>
        <p>Your transaction was verified and recorded.</p>
        <p>Reference ID: <span class="ref-id">{{ ref_id }}</span></p>
        
        <a href="{{ frontend_dashboard_url }}" class="btn">Return to Application</a>
    </div>
</body>
</html>
