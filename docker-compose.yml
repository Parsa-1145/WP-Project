
services:
  db:
    image: postgres:15-alpine
    container_name: wp-postgres
    restart: unless-stopped
    env_file: ./.env
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data:rw
    networks:
      - wp-network
    
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wp-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      - db
    volumes:
      - ./data/backend_static:/app/staticfiles:rw
      - ./data/backend_media:/app/media:rw
    networks:
      - wp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wp-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
    env_file: ./frontend/.env
    networks:
      - wp-network

networks:
  wp-network:
    driver: bridge